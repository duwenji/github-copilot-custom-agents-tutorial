name: Feature request
description: Suggest a new chapter, sample agent, or publishing enhancement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to add or improve?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this help learners or maintainers?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Suggested scope
      description: Which files, chapters, or workflows are involved?
