name: Validate tutorial repo

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install dependencies
        run: npm ci

      - name: Validate quiz data
        run: npm run quiz:validate

      - name: Build ebook artifact
        run: npm run ebook:build

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-copilot-custom-agents-tutorial-epub
          path: ebook-output/*.epub
          if-no-files-found: error
